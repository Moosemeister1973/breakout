<!DOCTYPE html>
<html>

<head>

  <title>Breakout Thingy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

  <style>
    .silkscreen-regular {
      font-family: "Silkscreen", sans-serif;
      font-weight: 400;
      font-style: normal;
      color: white;
      font-size: xx-large;
    }

    .silkscreen-bold {
      font-family: "Silkscreen", sans-serif;
      font-weight: 700;
      font-style: normal;
      color: white;
    }

    body {
      display: flex;
      justify-content: center;
      background-color: black;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    canvas {
      border: 5px solid gray;
      background-color: white;
    }

    div#titleContainer {
      display: flex;
      justify-content: center;
      text-align: center;
      position: absolute;
      width: 100%;
      bottom: 100%;
      margin-bottom: 10px;
    }

    div#title {
      position: relative;
      text-align: center;
      width: fit-content;
      border: 2px solid white;
    }

    div#container {
      position: relative;
      width: 600px;
    }

    div#lifeCounter {
      position: absolute;
      top: 25%;
      left: 5%;
      border: 2px solid white;
    }
  </style>

</head>

<body>
  <div id="lifeCounter" class="silkscreen-regular">
    3 Lives Remaining
  </div>
  <div id="container">
    <div id="titleContainer">
      <div id="title" class="silkscreen-regular">
        Breakout Game
      </div>
    </div>

    <canvas id="canvas" width="600" height="450"></canvas>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const canvas = document.getElementById('canvas')
      const lifeDisplay = document.getElementById('lifeCounter')
      const ctx = canvas.getContext('2d')
      const bg_p_c = ['#262626', '#363636']
      const bg_p_size = 30
      const PaddleData = { x: 255, y: 385, w: 90, h: 10, xMomentum: 0 }
      const BallData = { xPos: 300, yPos: 370, Rad: 9, xMomentum: 0, yMomentum: 0, truePosX: 300, truePosY: 370 }

      const keysHeld = new Set()

      const blocks = [
        // Row 1 - Red
        { x: 75, y: 60, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 0, 0, 1)', damagedColour: 'rgba(214, 0, 0, 0.7)' },
        { x: 140, y: 60, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 0, 0, 1)', damagedColour: 'rgba(214, 0, 0, 0.7)' },
        { x: 205, y: 60, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 0, 0, 1)', damagedColour: 'rgba(214, 0, 0, 0.7)' },
        { x: 270, y: 60, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 0, 0, 1)', damagedColour: 'rgba(214, 0, 0, 0.7)' },
        { x: 335, y: 60, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 0, 0, 1)', damagedColour: 'rgba(214, 0, 0, 0.7)' },
        { x: 400, y: 60, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 0, 0, 1)', damagedColour: 'rgba(214, 0, 0, 0.7)' },
        { x: 465, y: 60, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 0, 0, 1)', damagedColour: 'rgba(214, 0, 0, 0.7)' },
        // Row 2 - Yellow
        { x: 75, y: 85, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 203, 0, 1)', damagedColour: 'rgba(214, 203, 0, 0.7)' },
        { x: 140, y: 85, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 203, 0, 1)', damagedColour: 'rgba(214, 203, 0, 0.7)' },
        { x: 205, y: 85, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 203, 0, 1)', damagedColour: 'rgba(214, 203, 0, 0.7)' },
        { x: 270, y: 85, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 203, 0, 1)', damagedColour: 'rgba(214, 203, 0, 0.7)' },
        { x: 335, y: 85, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 203, 0, 1)', damagedColour: 'rgba(214, 203, 0, 0.7)' },
        { x: 400, y: 85, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 203, 0, 1)', damagedColour: 'rgba(214, 203, 0, 0.7)' },
        { x: 465, y: 85, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 203, 0, 1)', damagedColour: 'rgba(214, 203, 0, 0.7)' },
        // Row 3 - Green
        { x: 75, y: 110, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(89, 214, 0, 1)', damagedColour: 'rgba(89, 214, 0, 0.7)' },
        { x: 140, y: 110, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(89, 214, 0, 1)', damagedColour: 'rgba(89, 214, 0, 0.7)' },
        { x: 205, y: 110, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(89, 214, 0, 1)', damagedColour: 'rgba(89, 214, 0, 0.7)' },
        { x: 270, y: 110, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(89, 214, 0, 1)', damagedColour: 'rgba(89, 214, 0, 0.7)' },
        { x: 335, y: 110, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(89, 214, 0, 1)', damagedColour: 'rgba(89, 214, 0, 0.7)' },
        { x: 400, y: 110, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(89, 214, 0, 1)', damagedColour: 'rgba(89, 214, 0, 0.7)' },
        { x: 465, y: 110, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(89, 214, 0, 1)', damagedColour: 'rgba(89, 214, 0, 0.7)' },
        // Row 4 - Cyan
        { x: 75, y: 135, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(0, 211, 214, 1)', damagedColour: 'rgba(0, 211, 214, 0.7)' },
        { x: 140, y: 135, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(0, 211, 214, 1)', damagedColour: 'rgba(0, 211, 214, 0.7)' },
        { x: 205, y: 135, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(0, 211, 214, 1)', damagedColour: 'rgba(0, 211, 214, 0.7)' },
        { x: 270, y: 135, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(0, 211, 214, 1)', damagedColour: 'rgba(0, 211, 214, 0.7)' },
        { x: 335, y: 135, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(0, 211, 214, 1)', damagedColour: 'rgba(0, 211, 214, 0.7)' },
        { x: 400, y: 135, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(0, 211, 214, 1)', damagedColour: 'rgba(0, 211, 214, 0.7)' },
        { x: 465, y: 135, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(0, 211, 214, 1)', damagedColour: 'rgba(0, 211, 214, 0.7)' }
      ]

      let highHitChance = 0.8
      let lowHitCount = 1
      let highHitCount = 2

      blocks.forEach((e) => {
        e.hits = Math.random() < highHitChance ? lowHitCount : highHitCount
      })

      let started = false
      let gameOver = false

      let level = 1
      let lives = 3

      function resetBlocks() {
        if (highHitChance <= 0) {
            highHitChance = 0.8
            Math.random() < 0.5 ? lowHitCount++ : highHitCount++
          } else {
            highHitChance -= 0.2
          }
        blocks.forEach((e) => {
          e.hits = Math.random() < highHitChance ? lowHitCount : highHitCount
          e.status = 1
        })
        lives++
        lifeDisplay.innerText = lives === 1 ? lives + ' Life Remaining' : lives + ' Lives Remaining'
        level++
      }

      function drawBackground() {
        for (let row = 0; row < canvas.height / bg_p_size; row++) {
          for (let col = 0; col < canvas.width / bg_p_size; col++) {
            ctx.fillStyle = (row + col) % 2 === 0 ? bg_p_c[0] : bg_p_c[1]
            ctx.fillRect(col * bg_p_size, row * bg_p_size, bg_p_size, bg_p_size)
          }
        }
      }

      function drawPaddle() {
        ctx.fillStyle = '#ffffff'
        ctx.beginPath()
        ctx.roundRect(PaddleData.x, PaddleData.y, PaddleData.w, PaddleData.h, 3)
        ctx.fill()
        return
      }

      function drawBall() {
        ctx.fillStyle = '#ffffff'
        ctx.beginPath()
        ctx.arc(BallData.xPos, BallData.yPos, BallData.Rad, 0, Math.PI * 2)
        ctx.fill()
      }

      function generateBlocks() {
        blocks.forEach((e) => {
          if (e.status === 1) {
            ctx.fillStyle = e.hits === 2 ? e.colour : e.damagedColour
            ctx.beginPath()
            ctx.roundRect(e.x, e.y, e.w, e.h, 3)
            ctx.fill()
          }
        })
      }

      document.addEventListener("keydown", (e) => {
        keysHeld.add(e.key)
      })

      document.addEventListener("keyup", (e) => {
        keysHeld.delete(e.key)
      })

      document.addEventListener("keydown", (e) => {
        if (!started && (e.key === "ArrowUp" || e.key === "w" || e.key === " ")) {
          started = true
          if (PaddleData.xMomentum === 0) {
            BallData.xMomentum = Math.random() < 0.5 ? -8 : 8
          } else {
            BallData.xMomentum = PaddleData.xMomentum < 0 ? -8 : 8
          }
          BallData.yMomentum = -8
        }
      })

      

      let gameTick = setInterval(() => {

        if (gameOver) {
          return
        }

        if (keysHeld.has("ArrowLeft") || keysHeld.has("a")) {
          PaddleData.xMomentum = -12
        } else if (keysHeld.has("ArrowRight") || keysHeld.has("d")) {
          PaddleData.xMomentum = 12
        } else {
          PaddleData.xMomentum = 0
        }

        PaddleData.x = PaddleData.x + PaddleData.xMomentum

        if (BallData.xPos + BallData.Rad > 600) {
          BallData.xMomentum = -Math.abs(BallData.xMomentum)
        }
        if (BallData.xPos - BallData.Rad < 0) {
          BallData.xMomentum = Math.abs(BallData.xMomentum)
        }
        if (BallData.yPos - BallData.Rad < 0) {
          BallData.yMomentum = Math.abs(BallData.yMomentum)
        }
        if (BallData.yPos + BallData.Rad > 450) {
          BallData.xMomentum = 0
          BallData.yMomentum = 0
          if (started) {
            lives--
            if (lives === 1) lifeDisplay.innerText = lives + ' Life Remaining'
            else if (lives < 1) lifeDisplay.innerText = 'Out of Lives'
            else lifeDisplay.innerText = lives + ' Lives Remaining'
            if (lives <= 0) {
              gameOver = true
              alert("FAILURE")
              location.reload()
            } else {
              started = false
            }
          }
        }
        if (started) {
          if (BallData.yPos + BallData.Rad >= PaddleData.y && BallData.yPos - BallData.Rad <= PaddleData.y + PaddleData.h) {
            if (BallData.xPos + BallData.Rad >= PaddleData.x && BallData.xPos - BallData.Rad <= PaddleData.x + PaddleData.w) {
              BallData.xMomentum += (BallData.xPos - (PaddleData.x + PaddleData.w / 2)) * 0.05
              BallData.yMomentum = -Math.abs(BallData.yMomentum)
            }
          }
        }

        blocks.some((e) => {
          if (e.status === 1) {
            // Ball overlap check
            if (BallData.xPos + BallData.Rad >= e.x && BallData.xPos - BallData.Rad <= e.x + e.w && BallData.yPos + BallData.Rad >= e.y && BallData.yPos - BallData.Rad <= e.y + e.h) {
              const overlapL = BallData.xPos + BallData.Rad - e.x 
              const overlapR = (e.x + e.w) - (BallData.xPos - BallData.Rad) 
              const overlapT = BallData.yPos + BallData.Rad - e.y 
              const overlapB = (e.y + e.h) - (BallData.yPos - BallData.Rad)
              const minOverlap = Math.min(overlapL, overlapR, overlapT, overlapB)
              if (minOverlap === overlapT || minOverlap === overlapB) BallData.yMomentum *= -1
              else BallData.xMomentum *= -1
              e.hits--
              if (e.hits <= 0) e.status = 0
              return true
            }
          }
        })

        if (blocks.every(e => e.status === 0)) {
          started = false
          resetBlocks()
        }

        BallData.truePosX = BallData.truePosX + BallData.xMomentum
        BallData.truePosY = BallData.truePosY + BallData.yMomentum
        BallData.xPos = Math.floor(BallData.truePosX + 0.5)
        BallData.yPos = Math.floor(BallData.truePosY + 0.5)

        if (PaddleData.x < 1) PaddleData.x = 1
        if (PaddleData.x > 509) PaddleData.x = 509

        if (!started) {
          BallData.xPos = PaddleData.x + PaddleData.w / 2
          BallData.yPos = PaddleData.y - 15
          BallData.truePosX = PaddleData.x + PaddleData.w / 2
          BallData.truePosY = PaddleData.y - 15
        }

        drawBackground()
        drawPaddle()
        drawBall()
        generateBlocks()
      }, 30)

    })
  </script>

</body>

</html>
