<!DOCTYPE html>
<html>

<head>

  <title>Breakout Thingy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

  <style>
    .silkscreen-regular {
      font-family: "Silkscreen", sans-serif;
      font-weight: 400;
      font-style: normal;
      color: white;
      font-size: xx-large;
    }

    .silkscreen-bold {
      font-family: "Silkscreen", sans-serif;
      font-weight: 700;
      font-style: normal;
      color: white;
    }

    body {
      display: flex;
      justify-content: center;
      background-color: black;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    canvas {
      border: 5px solid gray;
      background-color: white;
    }

    div#titleContainer {
      display: flex;
      justify-content: center;
      text-align: center;
      position: absolute;
      width: 100%;
      bottom: 100%;
      margin-bottom: 10px;
    }

    div#title {
      position: relative;
      text-align: center;
      width: fit-content;
      border: 2px solid white;
    }

    div#container {
      position: relative;
      width: 600px;
    }

    div#lifeCounter {
      position: absolute;
      top: 25%;
      left: 5%;
      border: 2px solid white;
    }
  </style>

</head>

<body>
  <div id="lifeCounter" class="silkscreen-regular">
    3 Lives Remaining 
  </div>
  <div id="container">
    <div id="titleContainer">
      <div id="title" class="silkscreen-regular">
        Breakout Game
      </div>
    </div>

    <canvas id="canvas" width="600" height="450"></canvas>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const canvas = document.getElementById('canvas')
      const lifeDisplay = document.getElementById('lifeCounter')
      const ctx = canvas.getContext('2d')
      const bg_p_c = ['#262626', '#363636']
      const bg_p_size = 30
      const PaddleW = 90
      const PaddleH = 10
      const PaddlePos = { x: 255, y: 385 }
      const BallRad = 9
      const BallPos = { x: 300, y: 370 }
      const blockW = 50
      const blockH = 20
      const blockStartPos = { x: 60, y: 60 }

      const keysHeld = new Set()

      let blocks = []

      let started = false
      let gameOver = false
      let areaClear = false
      let paddleCooldown = false

      let paddleMomentum = 0
      let ballMomentumX = 0
      let ballMomentumY = 0

      let lives = 3

      function drawBackground() {
        for (let row = 0; row < canvas.height / bg_p_size; row++) {
          for (let col = 0; col < canvas.width / bg_p_size; col++) {
            ctx.fillStyle = (row + col) % 2 === 0 ? bg_p_c[0] : bg_p_c[1]
            ctx.fillRect(col * bg_p_size, row * bg_p_size, bg_p_size, bg_p_size)
          }
        }
      }

      function drawPaddle() {
        ctx.fillStyle = '#ffffff'
        ctx.beginPath()
        ctx.roundRect(PaddlePos.x, PaddlePos.y, PaddleW, PaddleH, 3)
        ctx.fill()
        return
      }

      function drawBall() {
        ctx.fillStyle = '#ffffff'
        ctx.beginPath()
        ctx.arc(BallPos.x, BallPos.y, BallRad, 0, Math.PI * 2)
        ctx.fill()
      }

      function generateBlocks() {
        if (!started || areaClear) {

        }
      }

      /*
      if (!started && e.key === "w" || e.key === "ArrowUp") {
          started = true
          ballMomentumX = paddleMomentum
          ballMomentumY = 5
        }
      */


      document.addEventListener("keydown", (e) => {
        keysHeld.add(e.key)
      })

      document.addEventListener("keyup", (e) => {
        keysHeld.delete(e.key)
      })

      document.addEventListener("keydown", (e) => {
        if (!started && (e.key === "ArrowUp" || e.key === "w")) {
          started = true
          if (paddleMomentum === 0) {
            ballMomentumX = Math.random() < 0.5 ? -4 : 4
          } else {
            ballMomentumX = paddleMomentum < 0 ? -4 : 4
          }
          ballMomentumY = -5
        }
      })

      let gameTick = setInterval(() => {

        if (gameOver) {
          clearInterval(gameTick)
          return
        }

        if (keysHeld.has("ArrowLeft") || keysHeld.has("a")) {
          paddleMomentum = -5
        } else if (keysHeld.has("ArrowRight") || keysHeld.has("d")) {
          paddleMomentum = 5
        } else {
          paddleMomentum = 0
        }

        PaddlePos.x = PaddlePos.x + paddleMomentum

        if (BallPos.x + BallRad > 600 || BallPos.x - BallRad < 0) {
          ballMomentumX *= -1
        }
        if (BallPos.y - BallRad < 0) {
          ballMomentumY *= -1
        }
        if (BallPos.y + BallRad > 450) {
          if (started) {
            lives--
            if (lives === 1) lifeDisplay.innerText = lives + ' Life Remaining'
            else if (lives < 1) lifeDisplay.innerText = 'Out of Lives'
            else lifeDisplay.innerText = lives + ' Lives Remaining'
            if (lives <= 0) {
              gameOver = true
              alert("FAILURE")
              location.reload()
            } else {
              started = false
            }
          }
        }
        if (BallPos.y > PaddlePos.y) paddleCooldown = false
        if (BallPos.y + BallRad >= PaddlePos.y && BallPos.y - BallRad <= PaddlePos.y + PaddleH) {
          if (BallPos.x + BallRad >= PaddlePos.x && BallPos.x - BallRad <= PaddlePos.x + PaddleW) {
            if (!paddleCooldown) {
              paddleCooldown = true
              ballMomentumY *= -1
            }
          }
        }

        BallPos.x = BallPos.x + ballMomentumX
        BallPos.y = BallPos.y + ballMomentumY

        if (PaddlePos.x < 1) PaddlePos.x = 1
        if (PaddlePos.x > 509) PaddlePos.x = 509

        if (!started) {
          BallPos.x = PaddlePos.x + 45
          BallPos.y = PaddlePos.y - 15
        }

        drawBackground()
        drawPaddle()
        drawBall()
      }, 10)

    })
  </script>

</body>

</html>
