<!DOCTYPE html>
<html>

<head>

  <title>Breakout Thingy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

  <style>
    .silkscreen-regular {
      font-family: "Silkscreen", sans-serif;
      font-weight: 400;
      font-style: normal;
      color: white;
      font-size: xx-large;
    }

    .silkscreen-bold {
      font-family: "Silkscreen", sans-serif;
      font-weight: 700;
      font-style: normal;
      color: white;
    }

    body {
      display: flex;
      justify-content: center;
      background-color: black;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    #canvas {
      border: 5px solid gray;
      background-color: white;
    }

    div#titleContainer {
      display: flex;
      justify-content: center;
      text-align: center;
      position: absolute;
      width: 100%;
      bottom: 100%;
      margin-bottom: 10px;
    }

    div#container {
      position: relative;
      width: 600px;
    }

    div.top {
      position: relative;
      text-align: center;
      width: fit-content;
      border: 2px solid white;
      font-size: 25px;
    }

    * {
      -webkit-touch-callout: none;
      user-select: none;
      touch-action: none;
      -webkit-user-select: none;
    }
  </style>

</head>

<body>

  <audio id='parrySFX' src='audio/parry.mp3'></audio>

  <div id="container">
    <div id="titleContainer">
      <!--
      <div id="title" class="silkscreen-regular top">
        Breakout Game
      </div>
      -->
      <div id="lifeCounter" class="silkscreen-regular top">
        3 Lives Remaining
      </div>
      <div id="scoreDisplay" class="silkscreen-regular top">
        Score: 0
      </div>
      <div id="highScore" class="silkscreen-regular top">
        High Score: 0
      </div>
    </div>

    <canvas id="canvas" width="600" height="450"></canvas>
    <canvas id="startScreen" width="600" height="450"
      style="display: block; position: absolute; top: 5px; left: 5px; transform: none; background-color: transparent;"></canvas>
    <div id="failureText" class="silkscreen-regular"
      style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; color: white; pointer-events: none;">
      FAILURE
    </div>
    <div id="startText" class="silkscreen-regular"
      style="display: block; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; color: white; pointer-events: none;">
      Press Enter or tap screen to Start (or don't if you think you can win blind)
    </div>
    <div id="failureText2" class="silkscreen-regular"
      style="display: none; position: absolute; top: 65%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; color: white; pointer-events: none;">
      Press Enter or Tap to Restart
    </div>
    <div id="touchScreenSpaceBar" class="silkscreen-regular"
      style="display: block; position: absolute; width: fit-content; top: 105%; left: 50%; transform: translate(-50%, 0%); font-size: 35px; color: white; border: 5px solid grey;">
      Launch Ball</div>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const eraseCode = ['e', 'r', 'a', 's', 'e']
      let eraseProgress = 0

      const canvas = document.getElementById('canvas')
      const startScreen = document.getElementById('startScreen')
      const startCTX = startScreen.getContext('2d')
      const lifeDisplay = document.getElementById('lifeCounter')
      const ctx = canvas.getContext('2d')
      ctx.shadowColor = '#ffffff'

      const bg_p_c = ['#262626', '#363636']
      const bg_p_size = 30
      const PaddleData = { x: 255, y: 385, w: 90, h: 10, xMomentum: 0 }
      const BallData = { xPos: 300, yPos: 370, Rad: 9, xMomentum: 0, yMomentum: 0, truePosX: 300, truePosY: 370, parried: false }
      const mobileSpace = document.getElementById('touchScreenSpaceBar')
      const scoreDisplay = document.getElementById('scoreDisplay')
      const highScoreDisplay = document.getElementById('highScore')
      const parrySFX = document.getElementById('parrySFX')

      const keysHeld = new Set()

      const blocks = [
        // Row 1 - Red
        { x: 75, y: 60, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 0, 0, 1)', alphaColourCode: '1)' },
        { x: 140, y: 60, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 0, 0, 1)', alphaColourCode: '1)' },
        { x: 205, y: 60, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 0, 0, 1)', alphaColourCode: '1)' },
        { x: 270, y: 60, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 0, 0, 1)', alphaColourCode: '1)' },
        { x: 335, y: 60, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 0, 0, 1)', alphaColourCode: '1)' },
        { x: 400, y: 60, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 0, 0, 1)', alphaColourCode: '1)' },
        { x: 465, y: 60, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 0, 0, 1)', alphaColourCode: '1)' },
        // Row 2 - Yellow
        { x: 75, y: 85, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 203, 0, 1)', alphaColourCode: '1)' },
        { x: 140, y: 85, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 203, 0, 1)', alphaColourCode: '1)' },
        { x: 205, y: 85, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 203, 0, 1)', alphaColourCode: '1)' },
        { x: 270, y: 85, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 203, 0, 1)', alphaColourCode: '1)' },
        { x: 335, y: 85, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 203, 0, 1)', alphaColourCode: '1)' },
        { x: 400, y: 85, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 203, 0, 1)', alphaColourCode: '1)' },
        { x: 465, y: 85, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(214, 203, 0, 1)', alphaColourCode: '1)' },
        // Row 3 - Green
        { x: 75, y: 110, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(89, 214, 0, 1)', alphaColourCode: '1)' },
        { x: 140, y: 110, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(89, 214, 0, 1)', alphaColourCode: '1)' },
        { x: 205, y: 110, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(89, 214, 0, 1)', alphaColourCode: '1)' },
        { x: 270, y: 110, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(89, 214, 0, 1)', alphaColourCode: '1)' },
        { x: 335, y: 110, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(89, 214, 0, 1)', alphaColourCode: '1)' },
        { x: 400, y: 110, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(89, 214, 0, 1)', alphaColourCode: '1)' },
        { x: 465, y: 110, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(89, 214, 0, 1)', alphaColourCode: '1)' },
        // Row 4 - Cyan
        { x: 75, y: 135, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(0, 211, 214, 1)', alphaColourCode: '1)' },
        { x: 140, y: 135, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(0, 211, 214, 1)', alphaColourCode: '1)' },
        { x: 205, y: 135, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(0, 211, 214, 1)', alphaColourCode: '1)' },
        { x: 270, y: 135, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(0, 211, 214, 1)', alphaColourCode: '1)' },
        { x: 335, y: 135, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(0, 211, 214, 1)', alphaColourCode: '1)' },
        { x: 400, y: 135, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(0, 211, 214, 1)', alphaColourCode: '1)' },
        { x: 465, y: 135, w: 60, h: 20, hits: 1, status: 1, colour: 'rgba(0, 211, 214, 1)', alphaColourCode: '1)' }
      ]

      let highHitChance = 0.8
      let lowHitCount = 1
      let highHitCount = 2
      const maxHits = 5

      blocks.forEach((e) => {
        e.hits = Math.random() < highHitChance ? lowHitCount : highHitCount
      })

      let startScreenOver = false
      let started = false
      let gameOver = false
      let paddleCooldown = false
      let usingTouch = false
      let autoWin = true
      let parryWindow = false
      let activeTouchID = null

      let level = 1
      let lives = 3
      let score = 0
      let highScore = Number(localStorage.getItem('highScore'))
      highScoreDisplay.innerText = 'High Score: ' + highScore

      lifeDisplay.innerText = lives > 1 ? lives + ' Lives Remaining' : lives + ' Life Remaining'

      // Fill in startScreen
      startCTX.fillStyle = 'Green'
      startCTX.fillRect(0, 0, startScreen.width, startScreen.height)

      function win() {
        gameOver = true
        score += 1000
        highScore += 1000
        localStorage.setItem('highScore', highScore)
        const totalPixels = []
        for (let row = 0; row < canvas.height; row++) {
          for (let col = 0; col < canvas.width; col++) {
            totalPixels.push({ x: col, y: row })
          }
        }
        for (let i = totalPixels.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [totalPixels[i], totalPixels[j]] = [totalPixels[j], totalPixels[i]]
        }

        let pixelsDrawn = 0
        const pixelsPerTick = 3000

        const winInterval = setInterval(() => {
          ctx.fillStyle = 'purple'
          ctx.globalAlpha = 1
          for (let i = 0; i < pixelsPerTick && pixelsDrawn < totalPixels.length; i++, pixelsDrawn++) {
            const { x, y } = totalPixels[pixelsDrawn]
            ctx.fillRect(x, y, 1, 1)
          }

          if (pixelsDrawn >= totalPixels.length) {
            clearInterval(winInterval)
            document.getElementById('failureText').innerText = 'YOU WIN'
            document.getElementById('failureText2').innerText = 'Final score: ' + score + '! tap or press Enter to restart.'
            document.getElementById('failureText').style.display = 'block'
            document.getElementById('failureText2').style.display = 'block'
          }
        }, 30)

        /*
        alert('You win! (placeholder)')
        location.reload()
        */
      }

      function resetBlocks() {
        if (highHitChance < 0) {
          if (highHitCount >= 5) win()
          highHitChance = 0.8
          lowHitCount + 2 == highHitCount ? lowHitCount++ : highHitCount++
        } else {
          highHitChance -= 0.2
        }
        blocks.forEach((e) => {
          e.hits = Math.random() < highHitChance ? lowHitCount : highHitCount
          e.status = 1

        })
        lives++
        lifeDisplay.innerText = lives === 1 ? lives + ' Life Remaining' : lives + ' Lives Remaining'
        level++
        score += 100
        scoreDisplay.innerText = 'Score: ' + score
        if (highScore < score) {
          localStorage.setItem('highScore', score)
          highScore = score
          highScoreDisplay.innerText = 'High Score: ' + highScore
        }
      }

      function drawBackground() {
        for (let row = 0; row < canvas.height / bg_p_size; row++) {
          for (let col = 0; col < canvas.width / bg_p_size; col++) {
            ctx.globalAlpha = 1
            ctx.fillStyle = (row + col) % 2 === 0 ? bg_p_c[0] : bg_p_c[1]
            ctx.fillRect(col * bg_p_size, row * bg_p_size, bg_p_size, bg_p_size)
          }
        }
      }

      function drawPaddle() {
        ctx.shadowColor = '#ffffff'
        ctx.shadowBlur = 10
        ctx.fillStyle = '#ffffff'
        ctx.globalAlpha = 1
        ctx.beginPath()
        ctx.roundRect(PaddleData.x, PaddleData.y, PaddleData.w, PaddleData.h, 3)
        ctx.fill()
        ctx.shadowBlur = 0
        return
      }

      const ballTrail = []
      const trailLength = 5
      let stepIteration = 0
      const stepIterationLength = 0

      function drawBall() {

        if (BallData.parried) {
          ctx.fillStyle = 'red'
          ctx.shadowColor = 'orange'
          ctx.shadowBlur = 30
        } else if (parryWindow) {
          ctx.shadowColor = 'yellow'
          ctx.shadowBlur = 30
          ctx.fillStyle = '#ffffff'
        } else {
          ctx.fillStyle = '#ffffff'
          ctx.shadowColor = '#ffffff'
          ctx.shadowBlur = 15
        }
        ballTrail.forEach((pos, index) => {
          ctx.globalAlpha = (index / trailLength) * 0.5
          ctx.beginPath()
          ctx.arc(pos.x, pos.y, BallData.Rad * (index / trailLength), 0, Math.PI * 2)
          ctx.fill()
        })

        ctx.globalAlpha = 1

        ctx.beginPath()
        ctx.arc(BallData.xPos, BallData.yPos, BallData.Rad, 0, Math.PI * 2)
        ctx.fill()
        if (stepIteration >= stepIterationLength) {
          stepIteration = 0
          ballTrail.push({ x: BallData.xPos, y: BallData.yPos })
          if (ballTrail.length > trailLength) ballTrail.shift()
        } else stepIteration++
        ctx.shadowBlur = 0
        ctx.fillStyle = '#ffffff'
        ctx.shadowColor = '#ffffff'
      }

      function generateBlocks() {
        ctx.shadowBlur = 5
        blocks.forEach((e) => {
          if (e.status === 1) {
            const alpha = e.hits / maxHits
            ctx.globalAlpha = alpha
            ctx.fillStyle = e.colour //.replace(e.alphaColourCode, alpha + ')')
            ctx.shadowColor = e.colour
            e.alphaColourCode = alpha + ')'
            ctx.beginPath()
            ctx.roundRect(e.x, e.y, e.w, e.h, 3)
            ctx.fill()
            //console.log(e.hits, maxHits, e.hits / maxHits)
          }
        })
        ctx.shadowBlur = 0
        ctx.shadowColor = '#ffffff'
      }

      document.addEventListener('touchstart', (e) => {
        e.preventDefault()
        usingTouch = true
      }, { passive: false })
      startScreen.addEventListener('touchstart', (e) => {
        e.preventDefault()
        clearStartScreen()
      }, { passive: false })
      mobileSpace.addEventListener('touchstart', (e) => {
        e.preventDefault()
        if (!started) {
          started = true
          if (PaddleData.xMomentum === 0) {
            BallData.xMomentum = Math.random() < 0.5 ? -8 : 8
          } else {
            BallData.xMomentum = PaddleData.xMomentum < 0 ? -8 : 8
          }
          BallData.yMomentum = -8
        } else if (parryWindow && started) {
          BallData.parried = true
          paddleCooldown = false
          parryWindow = false
          BallData.yMomentum = -Math.abs(BallData.yMomentum)
          BallData.xMomentum *= 2
          BallData.yMomentum *= 2
          document.body.style.backgroundColor = '#1f1f1f'
          parrySFX.play()
          setTimeout(() => { document.body.style.backgroundColor = 'black' }, 150)
        }
      }, { passive: false })
      document.addEventListener('touchstart', (e) => {
        e.preventDefault()
        keysHeld.clear()
        const touch = e.touches[0]
        activeTouchID = touch.identifier
        const x = touch.clientX
        if (x < window.innerWidth / 2) {
          PaddleData.xMomentum = -12
        } else PaddleData.xMomentum = 12
      }, { passive: false })
      document.addEventListener('touchend', (e) => {
        const touch = e.changedTouches[0]
        if (touch.identifier === activeTouchID) {
          PaddleData.xMomentum = 0
          activeTouchID = null
        }
      })

      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault()
        if (gameOver) location.reload()
      }, { passive: false })

      document.addEventListener("keydown", (e) => {
        usingTouch = false
        if (e.key === 'Enter' && gameOver) location.reload()
        if (e.key === 'Enter' && !startScreenOver) clearStartScreen()
        keysHeld.add(e.key)
      })

      document.addEventListener('keydown', (e) => {
        if (e.key === eraseCode[eraseProgress]) {
          eraseProgress++
          if (eraseProgress >= eraseCode.length) {
            if (confirm('Are you sure?')) {
              localStorage.clear()
              alert('Local data erased.')
              location.reload()
            } else alert('Data erasure aborted.')
          }
        } else eraseProgress = 0
      })

      document.addEventListener("keyup", (e) => {
        keysHeld.delete(e.key)
      })

      function clearStartScreen() {
        const totalPixels = []
        for (let row = 0; row < startScreen.height; row++) {
          for (let col = 0; col < canvas.width; col++) {
            totalPixels.push({ x: col, y: row })
          }
        }

        for (let i = totalPixels.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [totalPixels[i], totalPixels[j]] = [totalPixels[j], totalPixels[i]]
        }

        let pixelsDrawn = 0
        const pixelsPerTick = 3000

        const startInterval = setInterval(() => {
          for (let i = 0; i < pixelsPerTick && pixelsDrawn < totalPixels.length; i++, pixelsDrawn++) {
            const { x, y } = totalPixels[pixelsDrawn]
            startCTX.clearRect(x, y, 1, 1)
          }

          document.getElementById('startText').style.display = 'none'

          if (pixelsDrawn >= totalPixels.length) {
            clearInterval(startInterval)
            startScreen.style.display = 'none'
          }
        }, 30)
        startScreenOver = true
      }

      function showFailureScreen() {
        clearInterval(gameTick)

        // Fill totalPixels array with every pixel in the canvas
        const totalPixels = []
        for (let row = 0; row < canvas.height; row++) {
          for (let col = 0; col < canvas.width; col++) {
            totalPixels.push({ x: col, y: row })
          }
        }

        // Randomise pixel order
        for (let i = totalPixels.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [totalPixels[i], totalPixels[j]] = [totalPixels[j], totalPixels[i]]
        }

        let pixelsDrawn = 0
        const pixelsPerTick = 3000

        const failureInterval = setInterval(() => {
          ctx.fillStyle = 'red'
          ctx.globalAlpha = 1
          for (let i = 0; i < pixelsPerTick && pixelsDrawn < totalPixels.length; i++, pixelsDrawn++) {
            const { x, y } = totalPixels[pixelsDrawn]
            ctx.fillRect(x, y, 1, 1)
          }

          if (pixelsDrawn >= totalPixels.length) {
            clearInterval(failureInterval)
            document.getElementById('failureText').style.display = 'block'
            document.getElementById('failureText2').style.display = 'block'
          }
        }, 30)
      }

      document.addEventListener("keydown", (e) => {
        if (!started && (e.key === "ArrowUp" || e.key === "w" || e.key === " ")) {
          started = true
          if (PaddleData.xMomentum === 0) {
            BallData.xMomentum = Math.random() < 0.5 ? -8 : 8
          } else {
            BallData.xMomentum = PaddleData.xMomentum < 0 ? -8 : 8
          }
          BallData.yMomentum = -8
        } else if (e.key === ' ' && parryWindow && started) {
          BallData.parried = true
          paddleCooldown = false
          parryWindow = false
          BallData.yMomentum = -Math.abs(BallData.yMomentum)
          BallData.xMomentum *= 2
          BallData.yMomentum *= 2
          document.body.style.backgroundColor = '#1f1f1f'
          parrySFX.play()
          setTimeout(() => { document.body.style.backgroundColor = 'black' }, 150)
        }
      })

      function blockCollisionCheck() {
        let flipX = false
        let flipY = false
        blocks.some((e) => {
          if (e.status === 1) {
            // Ball overlap check
            if (BallData.xPos + BallData.Rad >= e.x && BallData.xPos - BallData.Rad <= e.x + e.w && BallData.yPos + BallData.Rad >= e.y && BallData.yPos - BallData.Rad <= e.y + e.h) {
              const overlapL = BallData.xPos + BallData.Rad - e.x
              const overlapR = (e.x + e.w) - (BallData.xPos - BallData.Rad)
              const overlapT = BallData.yPos + BallData.Rad - e.y
              const overlapB = (e.y + e.h) - (BallData.yPos - BallData.Rad)
              const minOverlap = Math.min(overlapL, overlapR, overlapT, overlapB)
              if (minOverlap === overlapT || minOverlap === overlapB) flipY = true
              else flipX = true
              if (BallData.parried) {
                BallData.parried = false
                BallData.xMomentum /= 2
                BallData.yMomentum /= 2
                e.hits -= 2
                score += 10
                if (e.hits <= 0) {
                  flipX = false
                  flipY = false
                }
              } else {
                e.hits--
                score += 5
              }
              scoreDisplay.innerText = 'Score: ' + score
              if (score > highScore) {
                localStorage.setItem('highScore', score)
                highScore = score
                highScoreDisplay.innerText = 'High Score: ' + highScore
              }
              if (e.hits <= 0) {
                e.status = 0
              }
              return true
            }
          }
        })
        if (flipX) BallData.xMomentum *= -1
        if (flipY) BallData.yMomentum *= -1
        return flipX || flipY
      }

      function paddleCollisionCheck() {
        if (!paddleCooldown) {
          if (started) {
            if (BallData.yPos + BallData.Rad >= PaddleData.y && BallData.yPos - BallData.Rad <= PaddleData.y + PaddleData.h) {
              if (BallData.xPos + BallData.Rad >= PaddleData.x && BallData.xPos - BallData.Rad <= PaddleData.x + PaddleData.w) {
                BallData.xMomentum += (BallData.xPos - (PaddleData.x + PaddleData.w / 2)) * 0.05
                BallData.yMomentum = -Math.abs(BallData.yMomentum)
                paddleCooldown = true
                return true
              }
            }
          }
        }
      }

      function wallCollisionCheck() {
        if (BallData.xPos + BallData.Rad > 600) {
          BallData.xMomentum = -Math.abs(BallData.xMomentum)
        } else if (BallData.xPos - BallData.Rad < 0) {
          BallData.xMomentum = Math.abs(BallData.xMomentum)
        } else if (BallData.yPos - BallData.Rad < 0) {
          BallData.yMomentum = Math.abs(BallData.yMomentum)
        } else if (BallData.yPos + BallData.Rad > 450) {
          BallData.xMomentum = 0
          BallData.yMomentum = 0
          BallData.parried = false
          if (started) {
            lives--
            score -= 50
            scoreDisplay.innerText = 'Score: ' + score
            if (lives === 1) lifeDisplay.innerText = lives + ' Life Remaining'
            else if (lives < 1) lifeDisplay.innerText = 'Out of Lives'
            else lifeDisplay.innerText = lives + ' Lives Remaining'
            if (lives <= 0) {
              gameOver = true
              showFailureScreen()
            } else {
              started = false
            }
          }
        }
      }

      // BEGIN INSANITY

      let autoPlaying = false

      function predictBallX() {
        let x = BallData.truePosX
        let y = BallData.truePosY
        let vx = BallData.xMomentum
        let vy = BallData.yMomentum

        while (y < PaddleData.y) {
          x += vx
          y += vy
          if (x + BallData.Rad > 600) vx = -Math.abs(vx)
          if (x - BallData.Rad < 0) vx = Math.abs(vx)
        }
        return x
      }

      // END INSANITY

      let gameTick = setInterval(() => {

        if (gameOver) {
          return
        }

        // Watch close below

        if (autoPlaying) {

          if (!started) {
            started = true
            BallData.xMomentum = Math.random() < 0.5 ? -8 : 8
            BallData.yMomentum = -8
          }

          const paddleCenter = PaddleData.x + PaddleData.w / 2

          // Predict landing point when ball travelling downward
          let targetX = BallData.yMomentum > 0
            ? predictBallX()
            : BallData.xPos

          // If horizontal momentum is too low,
          // intentionally offset paddle slightly
          // instead of running wildly across screen
          if (Math.abs(BallData.xMomentum) < 1.5) {

            const offset = BallData.xPos < 300 ? -25 : 25
            targetX += offset
          }

          const diff = targetX - paddleCenter

          if (Math.abs(diff) > 5) {
            PaddleData.xMomentum = diff > 0 ? 12 : -12
          } else {
            PaddleData.xMomentum = 0
          }
        } else if (keysHeld.has("ArrowLeft") || keysHeld.has("a")) {
          PaddleData.xMomentum = -12
        } else if (keysHeld.has("ArrowRight") || keysHeld.has("d")) {
          PaddleData.xMomentum = 12
        } else if (!usingTouch) {
          PaddleData.xMomentum = 0
        }
        // Watch close above

        PaddleData.x = PaddleData.x + PaddleData.xMomentum

        if (BallData.yPos < PaddleData.y - 5) paddleCooldown = false
        if (((BallData.yPos + BallData.Rad) > (PaddleData.y - 20)) && (((BallData.xPos + BallData.Rad) > PaddleData.x) &&
          ((BallData.xPos - BallData.Rad) < (PaddleData.x + PaddleData.w))) && !((BallData.yPos + BallData.Rad) > (PaddleData.y + PaddleData.h / 2))) parryWindow = true
        else parryWindow = false

        const steps = Math.ceil(Math.sqrt(BallData.xMomentum ** 2 + BallData.yMomentum ** 2))
        const stepX = BallData.xMomentum / steps
        const stepY = BallData.yMomentum / steps

        for (let i = 0; i < steps; i++) {
          if (gameOver) return
          BallData.truePosX += stepX
          BallData.truePosY += stepY
          BallData.xPos = Math.round(BallData.truePosX)
          BallData.yPos = Math.round(BallData.truePosY)
          if (blockCollisionCheck()) break
          if (paddleCollisionCheck()) break
          wallCollisionCheck()
        }

        if (blocks.every(e => e.status === 0)) {
          started = false
          resetBlocks()
        }

        if (PaddleData.x < 1) PaddleData.x = 1
        if (PaddleData.x > 509) PaddleData.x = 509

        if (!started) {
          BallData.xPos = PaddleData.x + PaddleData.w / 2
          BallData.yPos = PaddleData.y - 15
          BallData.truePosX = PaddleData.x + PaddleData.w / 2
          BallData.truePosY = PaddleData.y - 15
        }

        drawBackground()
        drawPaddle()
        drawBall()
        generateBlocks()
      }, autoPlaying ? 1 : 30)

    })
  </script>
