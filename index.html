<!DOCTYPE html>
<html>

<head>

  <title>Breakout Thingy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

  <style>
    .silkscreen-regular {
      font-family: "Silkscreen", sans-serif;
      font-weight: 400;
      font-style: normal;
      color: white;
    }

    .silkscreen-bold {
      font-family: "Silkscreen", sans-serif;
      font-weight: 700;
      font-style: normal;
      color: white;
    }

    body {
      display: flex;
      justify-content: center;
      background-color: black;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    canvas {
      width: 600px;
      height: 450px;
      border: 5px solid gray;
      background-color: white;
    }

    div#title{
      text-align: center;
      position: absolute;
      width: 100%;
      border: 2px solid white;
      border-radius: 5px;
      bottom: 100%;
      margin-bottom: 10px;
    }

    div#container{
      position: relative;
      width: 600px;
    }
  </style>

</head>

<body>
  <div id="container">
    <div id="title" class="silkscreen-regular">
      Breakout Game
    </div>

    <canvas id="canvas"></canvas>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

    })
  </script>

</body>

</html>
